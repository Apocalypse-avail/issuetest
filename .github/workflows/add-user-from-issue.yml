name: Add user from issue

on:
  issues:
    types: [opened]

jobs:
  add-user:
    if: contains(github.event.issue.labels.*.name, 'add-user')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Parse issue and update CSV
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python scripts/parse_issue.py

      - name: Generate HTML from CSV
        run: python scripts/generate_html.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add users.csv index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 1
          fi
          git commit -m "Add user from issue #${{ github.event.issue.number }}"
          git push

      - name: Comment and close issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '✅ 사용자 정보가 테이블에 추가되었습니다.'
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
