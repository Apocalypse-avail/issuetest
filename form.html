<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사용자 추가</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: "Malgun Gothic", sans-serif;
      background: #f4f7fb;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #333;
    }
    .card {
      width: 100%;
      max-width: 480px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      padding: 32px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.5rem;
      text-align: center;
    }
    p.desc {
      margin: 0 0 24px;
      text-align: center;
      color: #666;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      font-size: 0.9rem;
    }
    input, select {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 18px;
      border: 1px solid #d8dee8;
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #4a90d9;
      box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.15);
    }
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      background: #4a90d9;
      color: #fff;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      font-family: inherit;
    }
    button:hover {
      background: #3a7bc0;
    }
    .links {
      margin-top: 20px;
      text-align: center;
      font-size: 0.9rem;
    }
    .links a {
      color: #4a90d9;
      text-decoration: none;
    }
    .links a:hover {
      text-decoration: underline;
    }
    .note {
      margin-top: 16px;
      padding: 12px;
      background: #f0f4ff;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #555;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>사용자 추가</h1>
    <p class="desc">입력 후 제출하면 GitHub 이슈가 열리고,<br>자동으로 테이블에 반영됩니다.</p>

    <form id="userForm">
      <label for="name">이름</label>
      <input type="text" id="name" name="name" placeholder="예) 홍길동" required>

      <label for="region">지역</label>
      <input type="text" id="region" name="region" placeholder="예) 서울" required>

      <label for="gender">성별</label>
      <select id="gender" name="gender" required>
        <option value="">선택하세요</option>
        <option value="남">남</option>
        <option value="여">여</option>
      </select>

      <label for="age">나이</label>
      <input type="number" id="age" name="age" placeholder="예) 30" min="1" max="120" required>

      <button type="submit">GitHub 이슈로 등록하기</button>
    </form>

    <div class="note">
      제출하면 GitHub 로그인 페이지로 이동합니다. 이슈를 생성하면 Actions가 CSV와 HTML을 자동 업데이트합니다.
    </div>

    <div class="links">
      <a href="index.html">← 테이블 보기</a>
      &nbsp;|&nbsp;
      <a href="https://github.com/Apocalypse-avail/issuetest/issues/new?template=add-user">GitHub에서 직접 등록</a>
    </div>
  </div>

  <script>
    const REPO = "Apocalypse-avail/issuetest";

    function buildIssueBody(name, region, gender, age) {
      return [
        "### 이름",
        "",
        name,
        "",
        "### 지역",
        "",
        region,
        "",
        "### 성별",
        "",
        gender,
        "",
        "### 나이",
        "",
        String(age),
        ""
      ].join("\n");
    }

    document.getElementById("userForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const name = document.getElementById("name").value.trim();
      const region = document.getElementById("region").value.trim();
      const gender = document.getElementById("gender").value;
      const age = document.getElementById("age").value.trim();

      const title = "[추가] " + name;
      const body = buildIssueBody(name, region, gender, age);

      const url =
        "https://github.com/" + REPO + "/issues/new" +
        "?title=" + encodeURIComponent(title) +
        "&body=" + encodeURIComponent(body) +
        "&labels=add-user";

      window.open(url, "_blank");
    });
  </script>
</body>
</html>
