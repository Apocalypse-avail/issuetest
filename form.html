<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사용자 추가</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: "Malgun Gothic", sans-serif;
      background: #f4f7fb;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #333;
    }
    .card {
      width: 100%;
      max-width: 480px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      padding: 32px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.5rem;
      text-align: center;
    }
    p.desc {
      margin: 0 0 24px;
      text-align: center;
      color: #666;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .fields {
      margin-bottom: 24px;
      padding: 16px;
      background: #f9fbff;
      border-radius: 8px;
      font-size: 0.9rem;
      line-height: 1.8;
    }
    .fields strong {
      display: inline-block;
      width: 48px;
    }
    a.button {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      background: #4a90d9;
      color: #fff;
      font-size: 1rem;
      font-weight: bold;
      text-align: center;
      text-decoration: none;
    }
    a.button:hover {
      background: #3a7bc0;
    }
    .links {
      margin-top: 20px;
      text-align: center;
      font-size: 0.9rem;
    }
    .links a {
      color: #4a90d9;
      text-decoration: none;
    }
    .links a:hover {
      text-decoration: underline;
    }
    .note {
      margin-top: 16px;
      padding: 12px;
      background: #f0f4ff;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #555;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>사용자 추가</h1>
    <p class="desc">GitHub 이슈 입력창에서<br>아래 항목을 입력해 등록합니다.</p>

    <div class="fields">
      <div><strong>이름</strong> 예) 세종대왕</div>
      <div><strong>지역</strong> 예) 서울</div>
      <div><strong>성별</strong> 남 / 여</div>
      <div><strong>나이</strong> 예) 30</div>
    </div>

    <a class="button" href="https://github.com/Apocalypse-avail/issuetest/issues/new?template=add-user">
      GitHub 입력창 열기
    </a>

    <div class="note">
      입력창에서 정보를 입력한 뒤 <strong>Submit new issue</strong>를 누르면
      Actions가 CSV와 HTML을 자동 업데이트합니다.
    </div>

    <div class="links">
      <a href="index.html">← 테이블 보기</a>
    </div>
  </div>
</body>
</html>
