<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사용자 정보 테이블</title>
  <style>
    body {
      font-family: "Malgun Gothic", sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      color: #333;
    }
    h1 {
      text-align: center;
      margin-bottom: 8px;
    }
    .actions {
      text-align: center;
      margin-bottom: 24px;
    }
    .actions a {
      color: #4a90d9;
      text-decoration: none;
      font-weight: bold;
    }
    .actions a:hover {
      text-decoration: underline;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    th, td {
      border: 1px solid #ddd;
      padding: 12px 16px;
      text-align: center;
    }
    th {
      background-color: #4a90d9;
      color: #fff;
    }
    tr:nth-child(even) {
      background-color: #f9f9f9;
    }
    tr:hover {
      background-color: #f0f4ff;
    }
  </style>
</head>
<body>
  <h1>사용자 정보</h1>
  <p class="actions"><a href="form.html">+ 새 사용자 추가</a></p>
  <table>

        <th>지역</th>
        <th>성별</th>
        <th>나이</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>김민수</td>
        <td>서울</td>
        <td>남</td>
        <td>28</td>
      </tr>
      <tr>
        <td>이지은</td>
        <td>부산</td>
        <td>여</td>
        <td>32</td>
      </tr>
      <tr>
        <td>박준혁</td>
        <td>대구</td>
        <td>남</td>
        <td>25</td>
      </tr>
      <tr>
        <td>최수연</td>
        <td>인천</td>
        <td>여</td>
        <td>29</td>
      </tr>
      <tr>
        <td>정태호</td>
        <td>광주</td>
        <td>남</td>
        <td>35</td>
      </tr>
      <tr>
        <td>을지문덕</td>
        <td>광주</td>
        <td>여</td>
        <td>15</td>
      </tr>
    </tbody>
  </table>
</body>
</html>
